workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

image: python:3.12-slim

stages:
  - security-scans
  - test
  - gemini-review
  - deploy

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - project: 'ai/ai-code-reviewer'
    ref: 'master'
    file: 'templates/ai-code-review.yml'

variables:
  SECRET_DETECTION_ENABLED: 'true'
  SAST_EXCLUDED_PATHS: "spec, test, tests, tmp, target, logs, .git, .mvn, .settings, .vscode"

.test_template:
  before_script:
    - pip install -e ".[dev]"
  script:
    - pytest --tb=short --cov=src/gitlab_watcher --cov-report=xml --cov-report=lcov --cov-report=term-missing
  after_script:
    - echo "Coverage report generated successfully"
    - ls -la coverage.*
  coverage: '/TOTAL.* (\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
      - coverage.lcov
    expire_in: 1 week
  coverage: '/TOTAL.* (\d+%)$/'

test:
  extends: .test_template
  stage: test

.build_template:
  before_script:
    - python -m pip install --upgrade pip build twine

deploy_test:
  extends: .build_template
  stage: deploy
  needs: [test]
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
  variables:
    TWINE_USERNAME: $TEST_USERNAME
    TWINE_PASSWORD: $TEST_PASSWORD
    TWINE_REPOSITORY_URL: $TEST_REPOSITORY_URL
  script:
    - python -m build
    - twine upload dist/*

deploy_production:
  extends: .build_template
  stage: deploy
  needs: [test]
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/
  variables:
    TWINE_USERNAME: $PRODUCTION_USERNAME
    TWINE_PASSWORD: $PRODUCTION_PASSWORD
  script:
    # Sync version from tag to pyproject.toml
    - sed -i "s/^version = \".*\"/version = \"$CI_COMMIT_TAG\"/" pyproject.toml
    - python -m build
    - twine upload dist/*

# Explicit overrides for security jobs to ensure they run in correct stages and MRs
semgrep-sast:
  stage: security-scans
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

secret_detection:
  stage: security-scans
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
