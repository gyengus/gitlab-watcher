image: python:3.12-slim

stages:
  - test
  - deploy

.test_template:
  before_script:
    - pip install -e ".[dev]"
  script:
    - pytest --tb=short

test:
  extends: .test_template
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "test"

.build_template:
  before_script:
    - python -m pip install --upgrade pip build twine

deploy_test:
  extends: .build_template
  stage: deploy
  needs: [test]
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
  variables:
    TWINE_USERNAME: $TEST_USERNAME
    TWINE_PASSWORD: $TEST_PASSWORD
    TWINE_REPOSITORY_URL: $TEST_REPOSITORY_URL
  script:
    - python -m build
    - twine upload dist/*

deploy_production:
  extends: .build_template
  stage: deploy
  needs: [test]
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/
  variables:
    TWINE_USERNAME: $PRODUCTION_USERNAME
    TWINE_PASSWORD: $PRODUCTION_PASSWORD
  script:
    # Sync version from tag to pyproject.toml
    - sed -i "s/^version = \".*\"/version = \"$CI_COMMIT_TAG\"/" pyproject.toml
    - python -m build
    - twine upload dist/*